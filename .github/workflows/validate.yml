name: Validate exam bank

on:
  push:
    paths:
      - "skills/ccaf-exam/**"
      - "scripts/validate.py"
      - ".github/workflows/validate.yml"
  pull_request:
    paths:
      - "skills/ccaf-exam/**"
      - "scripts/validate.py"
      - ".github/workflows/validate.yml"
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate skill package + question bank
        run: python3 scripts/validate.py
